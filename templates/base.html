<head>
    <meta charset="UTF-8">
    <title>SimComAmor</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-startup-image" href="/static/img/splash.png">

    <!-- 🔒 evita tradução automática -->
    <meta name="google" content="notranslate">

    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#6B7D6D">
    <title>SimComAmor</title>

    <!-- RESPONSIVO (importantíssimo pro celular) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Georgia', serif;
            background-color: #ffffff; /* padrão das páginas */
            color: #3f4f44;
        }

        .home {
            background-color: #EEF2ED; /* verde oliva bem clarinho */
        }

        .container {
            padding: 80px 20px;
            text-align: center;
        }

        .btn {
            background-color: #6B7D6D;
            color: white;
            padding: 15px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 18px;
        }

        .btn:hover {
            background-color: #5a6a5c;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin-top: 40px;
        }

        .item {
            text-decoration: none;
            color: #3f4f44;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .item img {
            width: 70px;
            height: 70px;
            margin-bottom: 8px;
        }

        .item span {
            font-size: 14px;
        }

        .form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
        }

        .form input {
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        .form button {
            margin-top: 10px;
        }

        .planos {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        .plano {
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
        }

        .plano input {
            margin-right: 10px;
        }

        .plano span {
            font-weight: bold;
            color: #6B7D6D;
        }

        /* RESET SIMPLES */
        body.home {
            margin: 0;
            font-family: 'Georgia', serif;
            background: #FAF9F7;
            color: #3f4f44;
        }

        /* LOADER */
        .loader {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* HERO */
        .hero {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;

            padding: 20px;
        }

        .hero, .acesso {
            position: relative;
            z-index: 1;
        }

        .hero h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .hero .sub {
            font-size: 18px;
            max-width: 500px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* BOTÕES */
        .acoes {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 16px;
            border: none;
            cursor: pointer;
        }

        /* botão principal */
        .btn.principal {
            background: #3f4f44;
            color: white;
        }

        /* botão secundário */
        .btn.secundario {
            background: transparent;
            border: 1px solid #3f4f44;
            color: #3f4f44;
        }

        /* ACESSO */
        .acesso {
            text-align: center;
            padding: 40px 20px;
        }

        .acesso input {
            padding: 10px;
            width: 250px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-right: 10px;
        }

        .flor {
            position: fixed;
            top: -60px;
            width: 28px;
            opacity: 0.8;
            pointer-events: none;
            z-index: 0;

            animation: cair linear infinite;
        }

        @keyframes cair {
            to {
                transform: translateY(110vh);
            }
        }

    </style>
</head>

<body class="{% block body_class %}{% endblock %}">

    {% block content %}
    {% endblock %}

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/sw.js')
    .then(() => console.log('SW registrado'))
    .catch(err => console.log('Erro SW:', err));
}
</script>

</body>
</html>
